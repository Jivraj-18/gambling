<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poker AI Replay</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f0f0f; color: #e0e0e0; font-family: 'Courier New', monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; font-size: 13px; }

/* ── Header ── */
#header { display: flex; align-items: center; gap: 12px; padding: 8px 16px; background: #1a1a1a; border-bottom: 1px solid #2a2a2a; flex-shrink: 0; }
#header h1 { font-size: 14px; color: #a78bfa; letter-spacing: 1px; }
select { background: #222; color: #e0e0e0; border: 1px solid #3a3a3a; border-radius: 4px; padding: 4px 10px; font-family: inherit; font-size: 12px; }
#run-select { max-width: 340px; }
#step-counter { margin-left: auto; font-size: 11px; color: #555; white-space: nowrap; }

/* ── Layout ── */
#body { display: flex; flex: 1; overflow: hidden; }

/* ── Left: Hands sidebar ── */
#hands-sidebar { width: 200px; flex-shrink: 0; background: #141414; border-right: 1px solid #2a2a2a; display: flex; flex-direction: column; overflow: hidden; }
#hands-sidebar h2 { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #444; padding: 10px 12px 6px; flex-shrink: 0; }
#hands-list { flex: 1; overflow-y: auto; }
.hand-item { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #1e1e1e; }
.hand-item:hover { background: #1e1e1e; }
.hand-item.active { background: #1f1535; border-left: 3px solid #a78bfa; }
.hand-item .hand-cards { font-size: 13px; color: #e0e0e0; margin-bottom: 2px; }
.hand-item .hand-meta { font-size: 10px; color: #555; }
.hand-item .hand-meta span { color: #888; }
.verdict-badge { font-size: 9px; padding: 1px 5px; border-radius: 3px; display: inline-block; margin-top: 3px; }
.verdict-badge.well   { background: #052e16; color: #86efac; border: 1px solid #14532d; }
.verdict-badge.ok     { background: #1c1a00; color: #fde68a; border: 1px solid #78350f; }
.verdict-badge.missed { background: #450a0a; color: #fca5a5; border: 1px solid #7f1d1d; }

/* ── Analysis panel ── */
#analysis-section { border-top: 1px solid #2a2a2a; padding-top: 12px; display: flex; flex-direction: column; gap: 8px; }
#analysis-section .section-label { margin-bottom: 4px; }
.analysis-overall { font-size: 13px; font-weight: bold; }
.analysis-summary { font-size: 12px; line-height: 1.7; color: #ccc; padding: 8px; background: #1a1a1a; border-radius: 4px; border-left: 2px solid #4ade80; }
.step-row { display: flex; gap: 8px; align-items: flex-start; padding: 4px 0; border-bottom: 1px solid #1a1a1a; font-size: 11px; }
.step-verdict { flex-shrink: 0; padding: 1px 6px; border-radius: 3px; font-size: 10px; }
.step-verdict.correct     { background: #052e16; color: #86efac; }
.step-verdict.questionable{ background: #1c1a00; color: #fde68a; }
.step-verdict.mistake     { background: #450a0a; color: #fca5a5; }
.step-note { color: #aaa; line-height: 1.5; }

/* ── Center: Game state ── */
#game-panel { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; min-width: 0; }

.section-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #444; margin-bottom: 6px; }

/* Street badge */
#street-badge { display: inline-block; font-size: 11px; padding: 2px 10px; border-radius: 3px; background: #1a2a1a; color: #4ade80; border: 1px solid #2d6a2d; }

/* Cards */
.cards-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.card { background: #f5f5f5; color: #111; border-radius: 5px; padding: 6px 10px; font-size: 16px; font-weight: bold; min-width: 36px; text-align: center; line-height: 1; }
.card.red { color: #e53e3e; }
.card.blank { background: #222; color: #444; border: 1px dashed #333; }

/* Pot */
#pot-display { font-size: 20px; font-weight: bold; color: #fbbf24; }

/* Players table */
#players-table { width: 100%; border-collapse: collapse; }
#players-table th { font-size: 10px; text-transform: uppercase; color: #444; padding: 4px 8px; text-align: left; border-bottom: 1px solid #2a2a2a; }
#players-table td { padding: 5px 8px; border-bottom: 1px solid #1a1a1a; font-size: 12px; }
#players-table tr.hero td { color: #4ade80; }
#players-table tr.folded td { color: #444; }
.bet-chip { background: #2a2a2a; border-radius: 3px; padding: 1px 6px; font-size: 11px; }

/* Table bets */
#table-bets { display: flex; flex-wrap: wrap; gap: 6px; }
.tbet { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 4px; padding: 3px 8px; font-size: 11px; color: #93c5fd; }

/* ── Right: AI panel ── */
#ai-panel { width: 360px; flex-shrink: 0; background: #141414; border-left: 1px solid #2a2a2a; display: flex; flex-direction: column; overflow: hidden; }
#ai-panel.hidden { display: none; }
#ai-panel-inner { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 12px; }

.decision-row { display: flex; align-items: center; gap: 10px; }
.dec-badge { font-size: 15px; font-weight: bold; padding: 4px 14px; border-radius: 4px; }
.FOLD  { background: #450a0a; color: #fca5a5; border: 1px solid #7f1d1d; }
.CALL  { background: #0c1a4a; color: #93c5fd; border: 1px solid #1e3a5f; }
.RAISE { background: #3a1a00; color: #fcd34d; border: 1px solid #78350f; }
.CHECK { background: #052e16; color: #86efac; border: 1px solid #14532d; }
.PENDING { background: #1a1a1a; color: #888; border: 1px solid #333; }

.dec-amount { color: #fbbf24; font-size: 12px; }
.reasoning { font-size: 12px; line-height: 1.7; color: #ccc; padding: 8px; background: #1a1a1a; border-radius: 4px; border-left: 2px solid #a78bfa; }

details { border: 1px solid #2a2a2a; border-radius: 5px; }
summary { padding: 7px 10px; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #555; cursor: pointer; user-select: none; list-style: none; }
summary::before { content: '▶ '; font-size: 9px; }
details[open] summary::before { content: '▼ '; }
.code-box { padding: 10px; font-size: 11px; line-height: 1.6; white-space: pre-wrap; word-break: break-all; color: #777; max-height: 240px; overflow-y: auto; border-top: 1px solid #2a2a2a; background: #0a0a0a; }

/* ── Controls ── */
#controls { display: flex; align-items: center; gap: 8px; padding: 10px 16px; background: #1a1a1a; border-top: 1px solid #2a2a2a; flex-shrink: 0; }
button { background: #222; color: #e0e0e0; border: 1px solid #3a3a3a; border-radius: 4px; padding: 6px 14px; cursor: pointer; font-family: inherit; font-size: 12px; }
button:hover:not(:disabled) { background: #2e2e2e; }
button:disabled { opacity: 0.3; cursor: not-allowed; }
#btn-play { background: #2d1a6e; border-color: #5b21b6; color: #c4b5fd; }
#btn-play:hover:not(:disabled) { background: #3b1f8c; }
.speed-wrap { display: flex; align-items: center; gap: 6px; margin-left: auto; }
.speed-wrap label { font-size: 11px; color: #555; }
input[type=range] { accent-color: #a78bfa; width: 90px; }

/* ── Empty state ── */
#empty { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; background: #0f0f0f; z-index: 10; }
#empty h2 { color: #a78bfa; }
#empty p { color: #555; font-size: 12px; text-align: center; line-height: 1.8; }
#file-input { display: none; }
label.upload-btn { background: #222; border: 1px solid #3a3a3a; border-radius: 4px; padding: 8px 18px; cursor: pointer; font-size: 12px; }
label.upload-btn:hover { background: #2e2e2e; }
</style>
</head>
<body>

<div id="empty">
  <h2>♠ Poker AI Replay</h2>
  <p>Serve this folder locally to auto-load runs:<br><code>npx serve .</code><br><br>Or upload a run file directly:</p>
  <input type="file" id="file-input" accept=".json">
  <label class="upload-btn" for="file-input">Open run_*.json</label>
</div>

<div id="header" style="display:none">
  <h1>♠ Poker AI Replay</h1>
  <select id="run-select"></select>
  <span id="step-counter"></span>
</div>

<div id="body" style="display:none">

  <!-- Left: Hands -->
  <div id="hands-sidebar">
    <h2>Hands</h2>
    <div id="hands-list"></div>
  </div>

  <!-- Center: Game state -->
  <div id="game-panel">
    <div>
      <div class="section-label">Street</div>
      <span id="street-badge">—</span>
    </div>
    <div>
      <div class="section-label">Board</div>
      <div id="board" class="cards-row"></div>
    </div>
    <div>
      <div class="section-label">Pot</div>
      <div id="pot-display">—</div>
    </div>
    <div>
      <div class="section-label">Players</div>
      <table id="players-table">
        <thead><tr><th>Name</th><th>Stack</th><th>Bet</th><th>Status</th></tr></thead>
        <tbody id="players-body"></tbody>
      </table>
    </div>
    <div>
      <div class="section-label">Table action this round</div>
      <div id="table-bets"></div>
    </div>
  </div>

  <!-- Right: AI -->
  <div id="ai-panel">
    <div id="ai-panel-inner">
      <div>
        <div class="section-label">AI Decision</div>
        <div class="decision-row">
          <span id="dec-badge" class="dec-badge PENDING">—</span>
          <span id="dec-amount" class="dec-amount"></span>
        </div>
      </div>
      <div id="dec-reasoning" class="reasoning" style="display:none"></div>
      <details id="prompt-details">
        <summary>Prompt sent to Gemini</summary>
        <div id="ai-prompt" class="code-box"></div>
      </details>
      <details id="response-details">
        <summary>Raw Gemini response</summary>
        <div id="ai-raw" class="code-box"></div>
      </details>
      <div id="analysis-section" style="display:none">
        <div class="section-label">Post-hand analysis</div>
        <div id="analysis-overall" class="analysis-overall"></div>
        <div id="analysis-summary" class="analysis-summary"></div>
        <div id="analysis-steps"></div>
      </div>
    </div>
  </div>

</div>

<!-- Controls -->
<div id="controls" style="display:none">
  <button id="btn-prev">◀ Prev</button>
  <button id="btn-play">▶ Play</button>
  <button id="btn-next">Next ▶</button>
  <button id="btn-end">⏭ End</button>
  <div class="speed-wrap">
    <label id="speed-label">1×</label>
    <input type="range" id="speed" min="0.25" max="4" step="0.25" value="1">
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────
let runs     = [];   // manifest entries
let runData  = null; // current run { meta, hands }
let handIdx  = 0;
let stepIdx  = 0;
let playing  = false;
let timer    = null;
let isAiRun  = false;

// ── Card renderer ──────────────────────────────────────────────
function cardHtml(c) {
  if (!c) return '<div class="card blank">?</div>';
  const s   = c.slice(-1).toLowerCase();
  const red = s === 'h' || s === 'd';
  return `<div class="card${red ? ' red' : ''}">${c}</div>`;
}

// ── Render a decision ──────────────────────────────────────────
function render() {
  if (!runData?.hands?.length) return;
  const hand = runData.hands[handIdx];
  if (!hand) return;
  const entry = hand.decisions[stepIdx];
  if (!entry) return;

  const gs = entry.game_state || {};
  const ai = entry.ai_metadata || {};

  // Street
  document.getElementById('street-badge').textContent = entry.street || '—';

  // Board
  const board = gs.board || [];
  document.getElementById('board').innerHTML = board.length
    ? board.map(cardHtml).join('')
    : '<div class="card blank">—</div>';

  // Pot
  document.getElementById('pot-display').textContent = gs.pot != null ? gs.pot : '—';

  // Players
  const players = Array.isArray(gs.players)
    ? gs.players
    : Object.values(gs.players || {});
  document.getElementById('players-body').innerHTML = players.map(p => {
    const cls = p.isHero ? 'hero' : p.status === 'fold' ? 'folded' : '';
    return `<tr class="${cls}">
      <td>${p.isHero ? '★ ' : ''}${p.name || '?'}</td>
      <td>${p.stack ?? '?'}</td>
      <td><span class="bet-chip">${p.currentBet ?? '0'}</span></td>
      <td>${p.status || ''}</td>
    </tr>`;
  }).join('') || '<tr><td colspan="4" style="color:#444">No player data</td></tr>';

  // Table bets
  const tBets = gs.tableBets || {};
  document.getElementById('table-bets').innerHTML = Object.entries(tBets)
    .map(([id, v]) => {
      const name = players.find(p => p.id === id)?.name || id.slice(0, 8);
      return `<div class="tbet">${name}: ${v}</div>`;
    }).join('') || '<span style="color:#444;font-size:11px">—</span>';

  // AI panel
  if (isAiRun) {
    const dec = ai.decision || entry.actual_action || 'PENDING';
    const badge = document.getElementById('dec-badge');
    badge.textContent = dec;
    badge.className   = `dec-badge ${dec}`;
    const amtEl = document.getElementById('dec-amount');
    amtEl.textContent = ai.amount != null && ai.amount !== 0 ? `${ai.amount}` : '';
    const reas = document.getElementById('dec-reasoning');
    if (ai.reasoning) { reas.textContent = ai.reasoning; reas.style.display = 'block'; }
    else               { reas.style.display = 'none'; }
    document.getElementById('ai-prompt').textContent = ai.prompt || '—';
    document.getElementById('ai-raw').textContent    = ai.raw    || '—';
  }

  // Post-hand analysis (shown when viewing any step of this hand)
  const analysis = hand.analysis;
  const sec = document.getElementById('analysis-section');
  if (analysis) {
    const vcls = analysis.overall?.startsWith('Well') ? 'well' : analysis.overall?.startsWith('Acceptable') ? 'ok' : 'missed';
    document.getElementById('analysis-overall').innerHTML = `<span class="verdict-badge ${vcls}" style="font-size:12px;padding:3px 10px">${analysis.overall}</span>`;
    document.getElementById('analysis-summary').textContent = analysis.summary || '';
    document.getElementById('analysis-steps').innerHTML = (analysis.steps || []).map((s, i) => `
      <div class="step-row">
        <span class="step-verdict ${s.verdict}">${s.verdict}</span>
        <span class="step-note"><b>Decision ${i+1}:</b> ${s.note}</span>
      </div>`).join('');
    sec.style.display = 'flex';
  } else {
    sec.style.display = 'none';
  }

  // Counter
  document.getElementById('step-counter').textContent =
    `Hand ${handIdx + 1}/${runData.hands.length}  ·  Step ${stepIdx + 1}/${hand.decisions.length}`;

  // Buttons
  document.getElementById('btn-prev').disabled = stepIdx === 0 && handIdx === 0;
  document.getElementById('btn-next').disabled = stepIdx === hand.decisions.length - 1 && handIdx === runData.hands.length - 1;
  document.getElementById('btn-end').disabled  = stepIdx === hand.decisions.length - 1 && handIdx === runData.hands.length - 1;

  // Highlight active hand in sidebar
  document.querySelectorAll('.hand-item').forEach((el, i) => el.classList.toggle('active', i === handIdx));
}

// ── Navigation ─────────────────────────────────────────────────
function goStep(hi, si) {
  const hand = runData?.hands?.[hi];
  if (!hand) return;
  handIdx = hi;
  stepIdx = Math.max(0, Math.min(hand.decisions.length - 1, si));
  render();
}

function next() {
  const hand = runData.hands[handIdx];
  if (stepIdx < hand.decisions.length - 1) goStep(handIdx, stepIdx + 1);
  else if (handIdx < runData.hands.length - 1) goStep(handIdx + 1, 0);
}

function prev() {
  if (stepIdx > 0) goStep(handIdx, stepIdx - 1);
  else if (handIdx > 0) {
    const prevHand = runData.hands[handIdx - 1];
    goStep(handIdx - 1, prevHand.decisions.length - 1);
  }
}

function startPlay() {
  playing = true;
  document.getElementById('btn-play').textContent = '⏸ Pause';
  const step = () => {
    const hand = runData.hands[handIdx];
    if (!playing || (stepIdx === hand.decisions.length - 1 && handIdx === runData.hands.length - 1)) {
      stopPlay(); return;
    }
    next();
    const spd = parseFloat(document.getElementById('speed').value);
    timer = setTimeout(step, 1500 / spd);
  };
  step();
}
function stopPlay() {
  playing = false;
  clearTimeout(timer);
  document.getElementById('btn-play').textContent = '▶ Play';
}

// ── Load run ───────────────────────────────────────────────────
function loadRun(data) {
  runData  = data;
  handIdx  = 0;
  stepIdx  = 0;
  isAiRun  = data.meta?.ai ?? data.hands?.some(h => h.decisions?.some(d => d.ai_metadata));

  document.getElementById('ai-panel').classList.toggle('hidden', !isAiRun);

  // Build hands sidebar
  const list = document.getElementById('hands-list');
  list.innerHTML = (data.hands || []).map((h, i) => {
    const cards   = (h.holeCards || []).join(' ') || '?';
    const streets = [...new Set((h.decisions || []).map(d => d.street))].join(' → ');
    const v       = h.analysis?.overall || '';
    const vcls    = v.startsWith('Well') ? 'well' : v.startsWith('Acceptable') ? 'ok' : v ? 'missed' : '';
    const badge   = vcls ? `<div class="verdict-badge ${vcls}">${v}</div>` : '';
    return `<div class="hand-item" data-idx="${i}">
      <div class="hand-cards">${cards}</div>
      <div class="hand-meta">Hand ${h.handId} · <span>${h.decisions?.length || 0} moves</span></div>
      <div class="hand-meta">${streets}</div>
      ${badge}
    </div>`;
  }).join('');
  list.querySelectorAll('.hand-item').forEach(el => {
    el.onclick = () => { stopPlay(); goStep(parseInt(el.dataset.idx), 0); };
  });

  // Show UI
  document.getElementById('empty').style.display    = 'none';
  document.getElementById('header').style.display   = 'flex';
  document.getElementById('body').style.display     = 'flex';
  document.getElementById('controls').style.display = 'flex';
  render();
}

// ── Run selector ───────────────────────────────────────────────
async function populateSelector(manifest) {
  const sel = document.getElementById('run-select');
  sel.innerHTML = manifest.map(m => {
    const d   = new Date(m.timestamp).toLocaleString();
    const tag = m.ai ? `AI·${m.mode}` : 'Manual';
    return `<option value="${m.file}">[${tag}] ${d}  ${m.hands||0}h/${m.decisions||0}m</option>`;
  }).join('');
  sel.onchange = () => fetchRun(sel.value);
  if (manifest.length) fetchRun(manifest[0].file);
}

async function fetchRun(file) {
  const res  = await fetch(`data/${file}`);
  const data = await res.json();
  // Support both old flat format and new grouped format
  if (!data.hands && Array.isArray(data)) {
    // Legacy flat format — group by hole cards
    const grouped = [];
    let cur = null;
    for (const e of data) {
      const key = JSON.stringify(e.game_state?.holeCards);
      if (!cur || JSON.stringify(cur.holeCards) !== key) {
        cur = { handId: grouped.length + 1, holeCards: e.game_state?.holeCards, startedAt: e.timestamp, decisions: [] };
        grouped.push(cur);
      }
      cur.decisions.push(e);
    }
    loadRun({ meta: { ai: data.some(e => e.ai_metadata) }, hands: grouped });
  } else {
    loadRun(data);
  }
}

// ── Controls ───────────────────────────────────────────────────
document.getElementById('btn-prev').onclick  = () => { stopPlay(); prev(); };
document.getElementById('btn-next').onclick  = () => { stopPlay(); next(); };
document.getElementById('btn-end').onclick   = () => { stopPlay(); goStep(runData.hands.length - 1, runData.hands[runData.hands.length - 1].decisions.length - 1); };
document.getElementById('btn-play').onclick  = () => playing ? stopPlay() : startPlay();
document.getElementById('speed').oninput     = e => document.getElementById('speed-label').textContent = `${e.target.value}×`;

// ── File upload ────────────────────────────────────────────────
document.getElementById('file-input').onchange = e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = evt => fetchRun._fromFile(JSON.parse(evt.target.result));
  reader.readAsText(file);
};
fetchRun._fromFile = data => {
  if (Array.isArray(data)) fetchRun._fromFile({ hands: null, _raw: data });
  else loadRun(data);
};

// ── Auto-load ──────────────────────────────────────────────────
fetch('data/manifest.json')
  .then(r => r.json())
  .then(populateSelector)
  .catch(() => {});
</script>
</body>
</html>
